<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repository Moved — AGY Easy Install</title>
    <meta name="description" content="AGV Easy Install has been renamed and moved to AGY Easy Install. Redirecting...">
    <meta property="og:title" content="Repository Moved — AGY Easy Install">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <meta http-equiv="refresh" content="3;url=https://wtg-codes.github.io/agy-easy-install/">
    <!-- brew -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            background-image: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
            background-attachment: fixed;
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">
    <div aria-label="Redirect Notice" class="max-w-md w-full bg-slate-900/80 border border-slate-700/50 rounded-2xl p-8 shadow-xl text-center backdrop-blur-sm">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-amber-500/10 text-amber-500 mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>
        
        <h1 class="text-2xl font-extrabold text-white mb-2">This Page Has Moved</h1>
        <p class="text-slate-400 mb-6">
            <code>agv-easy-install</code> has been renamed and migrated to <strong><code>agy-easy-install</code></strong>.
        </p>

        <div class="bg-slate-800/50 rounded-xl p-4 mb-6 border border-slate-700/30">
            <p class="text-sm text-slate-300">
                Redirecting to the new documentation site in <span id="countdown" class="font-bold text-indigo-400">3</span> seconds...
            </p>
        </div>

        <a aria-label="Redirect Now" aria-expanded="false" href="https://wtg-codes.github.io/agy-easy-install/" class="inline-flex items-center justify-center w-full px-5 py-3 text-sm font-medium text-white bg-indigo-650 hover:bg-indigo-600 rounded-lg transition-colors bg-indigo-600 shadow-md shadow-indigo-900/20">
            Go to new site immediately
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
            </svg>
        </a>
    </div>

    <script>
        let seconds = 3;
        const countdownEl = document.getElementById('countdown');
        const interval = setInterval(() => {
            seconds--;
            if (countdownEl) countdownEl.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = "https://wtg-codes.github.io/agy-easy-install/";
            }
        }, 1000);
    </script>
</body>
</html>
