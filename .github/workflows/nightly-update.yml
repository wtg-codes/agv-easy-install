name: Nightly Antigravity URL Update

on:
  schedule:
    - cron: '0 0 * * *' # Run at midnight UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-url:
    runs-on: ubuntu-latest
    env:
      LATEST_URL: ''
      NEW_SHA: ''
      OLD_URL: ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Scrape latest URL
        id: scrape
        run: |
          LATEST_URL=$(python scrape_latest.py)
          echo "LATEST_URL=$LATEST_URL" >> "$GITHUB_ENV"
          echo "url=$LATEST_URL" >> "$GITHUB_OUTPUT"
          echo "### 🔍 Scraped URL" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$LATEST_URL" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Validate URL and Compute SHA-256
        if: "env.LATEST_URL != ''"
        run: |
          # Validate URL is reachable
          curl -fSsL --head "$LATEST_URL"

          # Download and compute SHA-256
          TMP_TAR=$(mktemp)
          curl -fSsL "$LATEST_URL" -o "$TMP_TAR"
          NEW_SHA=$(sha256sum "$TMP_TAR" | awk '{print $1}')
          rm -f "$TMP_TAR"
          echo "NEW_SHA=$NEW_SHA" >> "$GITHUB_ENV"
          echo "### ✅ Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SHA-256:** \`$NEW_SHA\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Update antigravity-manager.sh
        if: "env.LATEST_URL != ''"
        run: |
          OLD_URL=$(grep -oP '^DOWNLOAD_URL="\K[^"]+' antigravity-manager.sh)
          echo "OLD_URL=$OLD_URL" >> "$GITHUB_ENV"
          # Use # as sed delimiter to avoid injection from URLs containing / or |
          sed -i "s#^DOWNLOAD_URL=.*#DOWNLOAD_URL=\"$LATEST_URL\"#" antigravity-manager.sh
          sed -i "s#^KNOWN_SHA256=.*#KNOWN_SHA256=\"$NEW_SHA\"#" antigravity-manager.sh

      - name: Update README.md tarball URL
        if: "env.LATEST_URL != ''"
        run: |
          # Update the curl command in the README (line after TARBALL_URL marker)
          sed -i "/# TARBALL_URL/{ n; s#curl -fSsL \"[^\"]*\"#curl -fSsL \"$LATEST_URL\"# }" README.md

      - name: Update docs/index.html tarball URL
        if: "env.LATEST_URL != ''"
        run: |
          # Update the download link in the landing page (line after TARBALL_LINK marker)
          sed -i "/<!-- TARBALL_LINK/{ n; s#href=\"[^\"]*\"#href=\"$LATEST_URL\"# }" docs/index.html

      - name: Lint script
        if: "env.LATEST_URL != ''"
        run: shellcheck -e SC1091,SC2162 antigravity-manager.sh

      - name: Commit and push changes
        if: "env.LATEST_URL != ''"
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add antigravity-manager.sh README.md docs/index.html
          if ! git diff --cached --quiet; then
            git commit -m "chore: nightly update of Antigravity download URL

          From: $OLD_URL
          To:   $LATEST_URL"
            git push
            echo "### 📦 Commit pushed" >> "$GITHUB_STEP_SUMMARY"
            echo "Updated script, README, and landing page." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ℹ️ No changes" >> "$GITHUB_STEP_SUMMARY"
            echo "URL has not changed since last run." >> "$GITHUB_STEP_SUMMARY"
          fi
